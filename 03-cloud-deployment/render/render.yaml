# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent-render
    runtime: python
    region: singapore         # Chọn region: oregon, frankfurt, singapore
    plan: free                # free | starter | standard | pro
    
    # Root directory nếu app không ở root của repo
    rootDir: 03-cloud-deployment/render

    buildCommand: pip install -r requirements.txt
    startCommand: python app.py

    healthCheckPath: /health   # Render check path này định kỳ

    autoDeploy: true           # Auto deploy khi push to GitHub branch

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      # Secrets — set qua Render Dashboard (không commit giá trị thật)
      - key: OPENAI_API_KEY
        sync: false            # sync: false = set thủ công trên dashboard
      - key: AGENT_API_KEY
        generateValue: true    # Render tự sinh random value

    # Disk (nếu agent cần lưu file persistent)
    # disk:
    #   name: agent-data
    #   mountPath: /data
    #   sizeGB: 1

# ============================================================
# Optional: Redis cache (uncomment nếu cần)
# ============================================================
# - type: redis
#   name: agent-cache
#   plan: free
#   maxmemoryPolicy: allkeys-lru
#   ipAllowList: []  # Empty = allow all Render services

# ============================================================
# Cách deploy:
#   1. Push code lên GitHub
#   2. Render Dashboard → New → Blueprint
#   3. Connect repo → Render đọc render.yaml này
#   4. Review và Deploy
#
# Hoặc dùng Render CLI:
#   render blueprint launch
# ============================================================
