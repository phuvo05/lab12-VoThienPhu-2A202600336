version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - API_KEY=${API_KEY:-test-api-key-12345}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-key-67890}
      - RATE_LIMIT_REQUESTS=10
      - RATE_LIMIT_WINDOW=60
      - MONTHLY_COST_LIMIT=10.0
      - DEBUG=false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-agent-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  ai-agent-network:
    driver: bridge
