<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Conversational Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>
                <span class="header-icon">🤖</span>
                AI Assistant
            </h1>
            <div class="controls">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>Online</span>
                </div>
                <button class="btn btn-icon" id="themeToggle" title="Toggle theme">🌙</button>
                <button class="btn btn-clear" id="clearButton">
                    <span>🗑️</span>
                    Clear Chat
                </button>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">💬</div>
                    <h2>Start a Conversation</h2>
                    <p>Ask me anything! I'm here to help you with questions, ideas, or just a friendly chat.</p>
                    
                    <div class="suggestions">
                        <div class="suggestion-card">
                            <div class="suggestion-card-icon">👋</div>
                            <div class="suggestion-card-text">Hello! How are you?</div>
                        </div>
                        <div class="suggestion-card">
                            <div class="suggestion-card-icon">💡</div>
                            <div class="suggestion-card-text">What can you help me with?</div>
                        </div>
                        <div class="suggestion-card">
                            <div class="suggestion-card-icon">🤔</div>
                            <div class="suggestion-card-text">Tell me about yourself</div>
                        </div>
                        <div class="suggestion-card">
                            <div class="suggestion-card-icon">🚀</div>
                            <div class="suggestion-card-text">How does this work?</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea 
                        id="messageInput" 
                        class="chat-input" 
                        placeholder="Type your message here..."
                        rows="1"
                    ></textarea>
                    <button class="btn btn-send" id="sendButton">
                        Send 📤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
